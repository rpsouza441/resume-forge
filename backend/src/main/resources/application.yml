# =============================================================================
# Resume Forge - Base Configuration
# Profile-specific configs: application-dev.yml, application-prod.yml
# =============================================================================

spring:
  application:
    name: resume-forge

  # Database Configuration
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:resumeforge}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: ${JPA_SHOW_SQL:false}
        use_sql_comments: false
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
    show-sql: ${JPA_SHOW_SQL:false}
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  security:
    user:
      name: ${SECURITY_ADMIN_USER:admin}
      password: ${SECURITY_ADMIN_PASSWORD:admin}

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-change-in-production}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# AI Configuration
ai:
  provider: ${AI_PROVIDER:gemini}
  api-key: ${AI_API_KEY:your-api-key-here}
  model: ${AI_MODEL:gemini-2.0-flash}
  timeout-seconds: ${AI_TIMEOUT:90}
  temperature: ${AI_TEMPERATURE:0.3}
  max-tokens: ${AI_MAX_TOKENS:8192}
  fallback-provider: ${AI_FALLBACK_PROVIDER:}
  fallback-model: ${AI_FALLBACK_MODEL:}

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Logging
logging:
  level:
    root: INFO
    com.resumeforge: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

# =============================================================================
# Profile Activation
# =============================================================================
spring.config.activate.on-profile: base
